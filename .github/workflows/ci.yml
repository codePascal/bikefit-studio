name: GitHub CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - run: chmod +x ./gradlew
      - run: ./gradlew spotlessCheck

  unit-tests:
    name: unit_tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - run: chmod +x ./gradlew
      - run: ./gradlew :core:test
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-report
          path: core/build/reports/tests/test
          if-no-files-found: ignore

  static-analysis:
    name: static_code_analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - run: chmod +x ./gradlew
      - run: ./gradlew detekt

  smoke:
    name: smoke_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: chmod +x ./gradlew
      - name: Install pose-sidecar dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run video smoke test
        run: |
          if [ -f ci/sample.mp4 ]; then
            ./gradlew :desktop:videoSmoke \
              -PvideoPath="$PWD/ci/sample.mp4" \
              -PposePython="python" \
              -PposeScript="$PWD/pose_server.py"
          else
            echo "::warning::ci/sample.mp4 not present — skipping video smoke. Add the dummy video to enable it."
          fi
