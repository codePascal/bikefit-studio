name: Feature request
description: Suggest an idea or improvement for bikefit-studio
labels: ["enhancement"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and this isn't already requested.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this solve? What are you trying to do that's hard today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Calibration
        - Live analysis / overlays / angles
        - Fit report (FitEngine recommendations)
        - Pose backend (Python / MediaPipe sidecar)
        - Camera / video input (JavaCV)
        - Packaging / distribution
        - Build / CI / tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, references (e.g. a fitting method), anything else.
    validations:
      required: false
