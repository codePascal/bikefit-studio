name: Bug report
description: Report a problem with bikefit-studio
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug. Please fill out the sections below.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I'm on the latest `main`.
          required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch with `./gradlew :desktop:run`
        2. Calibrate from video…
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual behavior
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Calibration (marking reference points)
        - Live analysis / overlays / angles
        - Fit report (FitEngine recommendations)
        - Pose backend (Python / MediaPipe sidecar)
        - Camera / video input (JavaCV)
        - Build / CI / tooling
        - Other / not sure
    validations:
      required: true

  - type: dropdown
    id: input-source
    attributes:
      label: Input source
      options:
        - Webcam
        - USB phone (UVC webcam)
        - Video file
        - Not applicable
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in what's relevant.
      value: |
        - OS:
        - JDK (`java -version`):
        - Python (`python --version`):
        - MediaPipe version (`pip show mediapipe`):
        - App version / commit:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: Paste any relevant console output. This is automatically formatted as code.
      render: shell
    validations:
      required: false
